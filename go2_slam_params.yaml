slam_toolbox:
  ros__parameters:
    odom_frame: odom
    map_frame: map
    base_frame: unitree_go2/base_link
    scan_topic: /scan
    mode: mapping

    # RADIKALE RAM-SPAR-EINSTELLUNGEN
    transform_timeout: 0.1         # Warte maximal 0.1s auf TF, dann wegwerfen!
    tf_buffer_duration: 2.0        # Halte nur 2s TF-Historie vor
    minimum_time_interval: 0.2     # Nur alle 0.2s einen Scan verarbeiten (statt 17Hz)
    
    # Nachrichtenschlange begrenzen
    scan_buffer_size: 5            # Maximal 5 Scans zwischenspeichern
    scan_buffer_maximum_value: 20  # Absolute Obergrenze
    
    resolution: 0.05               # 5cm Pixel sind genug
    max_laser_range: 15.0          # Ignoriere alles, was weiter als 15m weg ist
    
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_region_strategy: LEVENBERG_MARQUARDT
    ceres_loss_function: None
